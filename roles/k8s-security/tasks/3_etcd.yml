---
# CHECK: etcd manifest, pki, 데이터 디렉터리 경로를 대상 Control Plane에서 확인하세요.

- name: "3-1. API Server의 etcd 저장 데이터 암호화 설정 (encryption-provider-config)"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: '^\s*- --encryption-provider-config='
    line: "    - --encryption-provider-config={{ k8s_encryption_provider_config }}"
    state: present
  when: k8s_enable_encryption_provider_config | bool
  notify: Restart Kubelet

- name: "3-2. API Server의 etcd 연동 통신 TLS 인증서 설정"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop: "{{ k8s_apiserver_etcd_tls_args }}"
  notify: Restart Kubelet

- name: "3-3. etcd 서버 TLS 및 인증 파라미터 적용"
  ansible.builtin.lineinfile:
    path: "{{ k8s_etcd_manifest }}"
    insertafter: '    - etcd'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop: "{{ k8s_etcd_server_args }}"
  notify: Restart Kubelet

- name: "3-5. etcd 데이터 디렉터리 권한 700 및 소유자 root 설정"
  ansible.builtin.file:
    path: "{{ k8s_etcd_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
