---
- name: Verify Docker security role in Docker container
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Stat Docker config directory
      ansible.builtin.stat:
        path: /etc/docker
      register: docker_config_dir_stat

    - name: Assert Docker config directory permissions
      ansible.builtin.assert:
        that:
          - docker_config_dir_stat.stat.exists
          - docker_config_dir_stat.stat.isdir
          - docker_config_dir_stat.stat.pw_name == "root"
          - docker_config_dir_stat.stat.gr_name == "root"
          - docker_config_dir_stat.stat.mode == "0755"

    - name: Stat docker.service
      ansible.builtin.stat:
        path: /lib/systemd/system/docker.service
      register: docker_service_stat

    - name: Assert docker.service permissions
      ansible.builtin.assert:
        that:
          - docker_service_stat.stat.exists
          - docker_service_stat.stat.pw_name == "root"
          - docker_service_stat.stat.gr_name == "root"
          - docker_service_stat.stat.mode == "0644"

    - name: Stat docker.socket
      ansible.builtin.stat:
        path: /lib/systemd/system/docker.socket
      register: docker_socket_stat

    - name: Assert docker.socket permissions
      ansible.builtin.assert:
        that:
          - docker_socket_stat.stat.exists
          - docker_socket_stat.stat.pw_name == "root"
          - docker_socket_stat.stat.gr_name == "root"
          - docker_socket_stat.stat.mode == "0644"

    - name: Read Docker Content Trust profile
      ansible.builtin.slurp:
        src: /etc/profile.d/docker-security.sh
      register: docker_content_trust_profile

    - name: Assert Docker Content Trust is enabled
      ansible.builtin.assert:
        that:
          - "'export DOCKER_CONTENT_TRUST=1' in (docker_content_trust_profile.content | b64decode)"
