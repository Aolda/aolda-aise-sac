---
# CHECK: 권한을 제한할 실제 일반 DB 계정을 db_regular_users에 지정하세요.

- name: "3-1. 일반 사용자에게서 GRANT OPTION 권한 회수"
  community.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "REVOKE GRANT OPTION ON *.* FROM '{{ item }}'@'%'"
  ignore_errors: true
  loop: "{{ db_regular_users }}"
  when: db_regular_users | length > 0

- name: "4-1. mysql.user 테이블에 대한 접근(Select) 권한 회수"
  community.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "REVOKE SELECT ON mysql.user FROM '{{ item }}'@'%'"
  ignore_errors: true
  loop: "{{ db_regular_users }}"
  when: db_regular_users | length > 0
