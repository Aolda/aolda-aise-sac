---
# CHECK: DB 소켓 경로와 설정 파일 경로를 대상 DB 서버에서 확인하세요.

- name: "1-0-1. DB 계정 삭제 보호 목록 구성"
  ansible.builtin.set_fact:
    db_account_delete_protected_users_effective: >-
      {{
        (
          (db_account_delete_protected_users | default([]))
          + (db_account_delete_protected_users_extra | default([]))
          + (
            (db_privilege_exempt_users | default([]))
            if (db_include_privilege_exempt_users_in_delete_protection | default(true) | bool)
            else []
          )
        ) | map('string') | unique | list
      }}

- name: "1-0-2. DB 계정 삭제 대상 요약 초기화"
  ansible.builtin.set_fact:
    db_unnecessary_account_delete_users: []
    db_disallowed_account_host_delete_users: []

- name: "1-0-3. 불필요 계정 삭제 대상 사용자 목록 구성"
  ansible.builtin.set_fact:
    db_unnecessary_account_delete_users: "{{ db_unnecessary_account_delete_users + [db_delete_candidate_user] }}"
  vars:
    db_delete_candidate_user: "{{ item.name | default(item.user | default(item if item is string else '')) | string }}"
  loop: "{{ db_unnecessary_accounts | default([]) }}"
  when: db_delete_candidate_user | length > 0

- name: "1-0-4. 허용되지 않은 Host/IP 삭제 대상 사용자 목록 구성"
  ansible.builtin.set_fact:
    db_disallowed_account_host_delete_users: "{{ db_disallowed_account_host_delete_users + [db_delete_candidate_user] }}"
  vars:
    db_delete_candidate_user: "{{ item.name | default(item.user | default(item if item is string else '')) | string }}"
  loop: "{{ db_disallowed_account_hosts | default([]) }}"
  when: db_delete_candidate_user | length > 0

- name: "1-0-5. 불필요 계정 삭제 대상과 보호 목록 충돌 검증"
  ansible.builtin.assert:
    that:
      - db_delete_candidate_user not in db_account_delete_protected_users_effective
    fail_msg: >-
      Protected DB user '{{ db_delete_candidate_user }}' is included in
      db_unnecessary_accounts. Remove protected users from deletion target
      or update db_account_delete_protected_users_extra.
  vars:
    db_delete_candidate_user: "{{ item.name | default(item.user | default(item if item is string else '')) | string }}"
  loop: "{{ db_unnecessary_accounts | default([]) }}"
  when: db_delete_candidate_user | length > 0

- name: "1-0-6. 허용되지 않은 Host/IP 삭제 대상과 보호 목록 충돌 검증"
  ansible.builtin.assert:
    that:
      - db_delete_candidate_user not in db_account_delete_protected_users_effective
    fail_msg: >-
      Protected DB user '{{ db_delete_candidate_user }}' is included in
      db_disallowed_account_hosts. This may delete an operational DB account.
  vars:
    db_delete_candidate_user: "{{ item.name | default(item.user | default(item if item is string else '')) | string }}"
  loop: "{{ db_disallowed_account_hosts | default([]) }}"
  when: db_delete_candidate_user | length > 0

- name: "1-0-7. 현재 DB 계정 목록 조회"
  ansible.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "SELECT User AS user, Host AS host FROM mysql.user ORDER BY User, Host"
  register: db_existing_accounts_query
  check_mode: false
  changed_when: false
  failed_when: db_existing_accounts_query.failed | default(false)

- name: "1-0-8. 현재 DB 계정 report 초기화"
  ansible.builtin.set_fact:
    db_existing_account_users: []
    db_existing_account_entries: []
    db_regular_user_names: []

- name: "1-0-8-1. 현재 DB 계정 목록 구성"
  ansible.builtin.set_fact:
    db_existing_account_users: "{{ db_existing_account_users + [item.user | string] }}"
    db_existing_account_entries: "{{ db_existing_account_entries + [(item.user | string) ~ '@' ~ (item.host | string)] }}"
  loop: "{{ db_existing_accounts_query.query_result[0] | default([]) }}"

- name: "1-0-8-2. 권한 회수 대상 사용자 목록 구성"
  ansible.builtin.set_fact:
    db_regular_user_names: "{{ db_regular_user_names + [db_regular_user_name] }}"
  vars:
    db_regular_user_name: "{{ item.name | default(item.user | default(item if item is string else '')) | string }}"
  loop: "{{ db_regular_users | default([]) }}"
  when: db_regular_user_name | length > 0

- name: "1-0-9. DB 계정 관리 report 출력"
  ansible.builtin.debug:
    msg:
      - "[DB Account Report]"
      - "Existing accounts: {{ db_existing_account_entries | default([]) | unique | sort }}"
      - "Deletion target users: {{ db_account_delete_target_users | unique | sort }}"
      - "Protected from deletion: {{ db_account_delete_protected_users_effective | default([]) | sort }}"
      - "Privilege revoke targets: {{ db_regular_user_names | default([]) | unique | sort }}"
      - "Privilege exempt users: {{ db_privilege_exempt_users | default([]) }}"
      - "Unclassified account users: {{ db_unclassified_account_users | unique | sort }}"
  vars:
    db_account_delete_target_users: >-
      {{
        (db_test_users | default([]))
        + (db_unnecessary_account_delete_users | default([]))
        + (db_disallowed_account_host_delete_users | default([]))
      }}
    db_classified_account_users: >-
      {{
        (db_account_delete_target_users | list)
        + (db_account_delete_protected_users_effective | default([]))
        + (db_regular_user_names | default([]))
      }}
    db_unclassified_account_users: "{{ db_existing_account_users | default([]) | difference(db_classified_account_users) }}"

- name: "1-1. 익명 사용자(Anonymous) 제거"
  ansible.mysql.mysql_user:
    name: ''
    host_all: true
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"
  when:
    - db_changes_allowed | bool
    - "'' not in db_account_delete_protected_users_effective"

- name: "1-2. 테스트 계정(test, guest) 제거"
  ansible.mysql.mysql_user:
    name: "{{ item }}"
    host_all: true
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"
  loop: "{{ db_test_users }}"
  when:
    - db_changes_allowed | bool
    - item not in db_account_delete_protected_users_effective

- name: "1-3. 불필요한 DB 계정 제거"
  ansible.mysql.mysql_user:
    name: "{{ db_delete_candidate_user }}"
    host: "{{ item.host | default(omit) }}"
    host_all: "{{ item.host is not defined }}"
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"
  loop: "{{ db_unnecessary_accounts }}"
  vars:
    db_delete_candidate_user: "{{ item.name | default(item.user | default(item if item is string else '')) | string }}"
  when:
    - db_changes_allowed | bool
    - db_delete_candidate_user | length > 0
    - db_delete_candidate_user not in db_account_delete_protected_users_effective

- name: "1-4. 허용되지 않은 접속 Host/IP 계정 제거"
  ansible.mysql.mysql_user:
    name: "{{ db_delete_candidate_user }}"
    host: "{{ item.host }}"
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"
  loop: "{{ db_disallowed_account_hosts }}"
  vars:
    db_delete_candidate_user: "{{ item.name | default(item.user | default(item if item is string else '')) | string }}"
  when:
    - db_changes_allowed | bool
    - db_delete_candidate_user | length > 0
    - db_delete_candidate_user not in db_account_delete_protected_users_effective

- name: "2-1. MariaDB 패스워드 복잡도 정책 설정 (설정파일 수정)"
  ansible.builtin.blockinfile:
    path: "{{ db_config_file }}"
    marker: "{{ db_password_policy_marker }}"
    insertafter: "[mysqld]"
    block: "{{ db_password_policy_block }}"
    backup: true
  when:
    - db_changes_allowed | bool
    - (db_effective_password_policy_type | trim) == "mariadb_simple"
    - db_apply_password_policy | bool
  notify: Restart DB Service

- name: "2-1-1. MariaDB 패스워드 정책 점검 모드 안내"
  ansible.builtin.debug:
    msg: >-
      MariaDB password policy is supported but not modified in default mode.
      Set db_apply_password_policy=true after compatibility review to write
      simple_password_check settings.
  when:
    - (db_effective_password_policy_type | trim) == "mariadb_simple"
    - not db_apply_password_policy | bool

- name: "2-2. MySQL validate_password 컴포넌트 설치 상태 확인"
  ansible.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "{{ db_validate_password_component_check_query }}"
  register: db_validate_password_component_check
  check_mode: false
  changed_when: false
  vars:
    db_validate_password_component_check_query: >-
      SELECT component_urn
      FROM mysql.component
      WHERE component_urn = 'file://component_validate_password'
  when:
    - db_apply_password_policy | bool
    - db_enable_validate_password_component | bool
    - (db_effective_password_policy_type | trim) == "mysql_validate"

- name: "2-2-1. MySQL validate_password 컴포넌트 활성화"
  ansible.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "INSTALL COMPONENT IF NOT EXISTS 'file://component_validate_password'"
  register: db_validate_password_component_install
  changed_when: db_validate_password_component_install is succeeded
  failed_when: db_validate_password_component_install.failed | default(false)
  when:
    - db_changes_allowed | bool
    - db_apply_password_policy | bool
    - db_enable_validate_password_component | bool
    - (db_effective_password_policy_type | trim) == "mysql_validate"
    - db_validate_password_component_check.query_result[0] | length == 0

- name: "2-3. MySQL validate_password 복잡도 정책 설정 (설정파일 수정)"
  ansible.builtin.blockinfile:
    path: "{{ db_config_file }}"
    marker: "{{ db_validate_password_marker }}"
    insertafter: "[mysqld]"
    block: "{{ db_validate_password_block }}"
    backup: true
  when:
    - db_changes_allowed | bool
    - (db_effective_password_policy_type | trim) == "mysql_validate"
    - db_apply_password_policy | bool
  notify: Restart DB Service

- name: "2-3-1. MySQL validate_password 정책 점검 모드 안내"
  ansible.builtin.debug:
    msg: >-
      MySQL validate_password is supported but not modified in default mode.
      Set db_apply_password_policy=true and, if needed,
      db_enable_validate_password_component=true after version compatibility review.
  when:
    - (db_effective_password_policy_type | trim) == "mysql_validate"
    - not db_apply_password_policy | bool

- name: "2-4. 지원되지 않는 DB 버전의 패스워드 정책 적용 제외 안내"
  ansible.builtin.debug:
    msg: >-
      Password policy is not automatically configured for
      {{ db_server_version }} {{ db_server_version_comment }}.
      Configure a supported plugin manually if required.
  when: (db_effective_password_policy_type | trim) == "unsupported"
