---
- name: Register target
  ansible.builtin.import_playbook: ../resources/target-host.yml

- name: Converge OpenStack component security role
  hosts: molecule_targets
  become: true
  gather_facts: true
  vars:
    openstack_component: "{{ lookup('env', 'MOLECULE_OPENSTACK_COMPONENT') | default('', true) }}"
    openstack_allowed_components:
      - keystone
      - nova
      - cinder
      - glance
      - neutron
      - horizon
  tasks:
    - name: Require supported OpenStack component
      ansible.builtin.assert:
        that:
          - openstack_component in openstack_allowed_components
        fail_msg: "Set MOLECULE_OPENSTACK_COMPONENT to one of: {{ openstack_allowed_components | join(', ') }}."

    - name: Include selected OpenStack role
      ansible.builtin.include_role:
        name: "{{ openstack_component }}-security"
