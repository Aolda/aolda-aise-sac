---
# roles/db-security/tasks/3_root_and_logging.yml

# ==============================================================================
# ### [CHECK] 사전 확인 필요 사항 ###
# 1. 설정 파일 경로: /etc/my.cnf (또는 /etc/mysql/mariadb.conf.d/50-server.cnf)
# 2. 로그 저장 경로: /var/log/mysql (폴더가 없으면 생성해야 함)
# ==============================================================================

# [1. root 권한으로 서버 구동 제한]
# 가이드: [mysqld] 그룹의 'user' 지시자 확인 및 user = mysql 설정
- name: "1-1. DB 구동 계정을 mysql로 강제 설정"
  ansible.builtin.lineinfile:
    # ### [CHECK] 실제 설정 파일 경로로 수정하세요 ###
    path: /etc/my.cnf
    regexp: '^user\s*='
    line: 'user = mysql'
    insertafter: '\[mysqld\]'
    state: present
  notify: Restart DB Service

# [2. 환경설정 파일 접근 권한]
# 가이드: 접근 권한이 640(-rw-r-----) 이하이면 양호
- name: "2-1. 설정 파일 권한을 640으로 설정 (root:mysql)"
  ansible.builtin.file:
    # ### [CHECK] 실제 설정 파일 경로로 수정하세요 ###
    path: /etc/my.cnf
    owner: root
    # ### [CHECK] DB 그룹명 확인 (보통 mysql) ###
    group: mysql
    mode: '0640'

# [3. 로그 활성화 (Slow Query Log)]
# 가이드: 침해 사고 및 장애 분석을 위해 로그 활성화
# (General Log는 성능 저하 우려로 Slow Log 우선 적용)

# 3-1. 로그 파일이 저장될 디렉터리 생성 (권한 문제 방지)
- name: "3-1. 로그 저장 디렉터리 생성 및 권한 설정"
  ansible.builtin.file:
    path: /var/log/mysql
    state: directory
    owner: mysql
    group: mysql
    mode: '0750'

# 3-2. 설정 파일에 로그 설정 추가
- name: "3-2. Slow Query Log 활성화 설정 추가"
  ansible.builtin.blockinfile:
    # ### [CHECK] 실제 설정 파일 경로로 수정하세요 ###
    path: /etc/my.cnf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Logging"
    insertafter: "[mysqld]"
    block: |
      slow_query_log = 1
      slow_query_log_file = /var/log/mysql/mariadb-slow.log
      long_query_time = 2
      log_error = /var/log/mysql/error.log
  notify: Restart DB Service