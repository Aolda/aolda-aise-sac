---
# CHECK: 기존 Pod는 자동 수정하지 않고 host namespace 및 securityContext 설정만 점검합니다.

- name: "6-1. 전체 Pod 보안 설정 조회"
  ansible.builtin.command: "kubectl --kubeconfig={{ k8s_kubectl_config }} get pods --all-namespaces -o json"
  register: k8s_pods_json
  changed_when: false
  failed_when: false
  check_mode: false
  when: k8s_is_control_plane | bool

- name: "6-2. 전체 Pod 목록 기본값 설정"
  ansible.builtin.set_fact:
    k8s_pods: []

- name: "6-2-1. 전체 Pod 목록 파싱"
  ansible.builtin.set_fact:
    k8s_pods: "{{ (k8s_pods_json.stdout | from_json)['items'] | default([]) }}"
  when:
    - k8s_pods_json is defined
    - k8s_pods_json.rc | default(1) == 0
    - k8s_pods_json.stdout | default('') | trim is match('^\\{')

- name: "6-2-2. 전체 Pod 목록 조회 실패 또는 미실행 안내"
  ansible.builtin.debug:
    msg: >-
      Pod security check is report-only and could not read Pod JSON on this node.
      control_plane={{ k8s_is_control_plane | default(false) }},
      rc={{ k8s_pods_json.rc | default('skipped') }},
      stdout={{ k8s_pods_json.stdout | default('') | trim }}.
  when: k8s_pods | length == 0

- name: "6-3. host namespace 공유 Pod 경고 출력"
  ansible.builtin.debug:
    msg: >-
      Pod {{ item.metadata.namespace }}/{{ item.metadata.name }} shares host namespace:
      hostNetwork={{ item.spec.hostNetwork | default(false) }},
      hostPID={{ item.spec.hostPID | default(false) }},
      hostIPC={{ item.spec.hostIPC | default(false) }}
  loop: "{{ k8s_pods | default([]) }}"
  loop_control:
    label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
  when:
    - not k8s_fail_on_policy_violation | bool
    - item.spec.hostNetwork | default(false) or item.spec.hostPID | default(false) or item.spec.hostIPC | default(false)

- name: "6-4. host namespace 공유 Pod 점검"
  ansible.builtin.assert:
    that:
      - not (item.spec.hostNetwork | default(false))
      - not (item.spec.hostPID | default(false))
      - not (item.spec.hostIPC | default(false))
    fail_msg: "Pod {{ item.metadata.namespace }}/{{ item.metadata.name }} shares host namespace."
    quiet: true
  loop: "{{ k8s_pods | default([]) }}"
  loop_control:
    label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
  when: k8s_fail_on_policy_violation | bool

- name: "6-5. 컨테이너 securityContext 미흡 경고 출력"
  ansible.builtin.debug:
    msg: "Container {{ item.0.metadata.namespace }}/{{ item.0.metadata.name }}/{{ item.1.name }} should define restricted securityContext."
  loop: "{{ k8s_pods | default([]) | subelements('spec.containers', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.metadata.namespace }}/{{ item.0.metadata.name }}/{{ item.1.name }}"
  vars:
    container_security_context: "{{ item.1.securityContext | default({}) }}"
  when:
    - not k8s_fail_on_policy_violation | bool
    - container_security_context.allowPrivilegeEscalation | default(true)
      or not (container_security_context.runAsNonRoot | default(false))
      or container_security_context.runAsUser | default(0) | int == 0
      or "ALL" not in (container_security_context.capabilities.drop | default([]))
      or container_security_context.seccompProfile.type | default("") != "RuntimeDefault"

- name: "6-6. 컨테이너 securityContext 점검"
  ansible.builtin.assert:
    that:
      - not (container_security_context.allowPrivilegeEscalation | default(true))
      - container_security_context.runAsNonRoot | default(false)
      - container_security_context.runAsUser | default(0) | int != 0
      - "'ALL' in (container_security_context.capabilities.drop | default([]))"
      - container_security_context.seccompProfile.type | default("") == "RuntimeDefault"
    fail_msg: "Container {{ item.0.metadata.namespace }}/{{ item.0.metadata.name }}/{{ item.1.name }} does not meet restricted securityContext requirements."
    quiet: true
  loop: "{{ k8s_pods | default([]) | subelements('spec.containers', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.metadata.namespace }}/{{ item.0.metadata.name }}/{{ item.1.name }}"
  vars:
    container_security_context: "{{ item.1.securityContext | default({}) }}"
  when: k8s_fail_on_policy_violation | bool

- name: "6-7. 제한된 RoleBinding 존재 여부 확인"
  ansible.builtin.command: >-
    kubectl --kubeconfig={{ k8s_kubectl_config }}
    get rolebinding {{ k8s_restricted_role_name }}-binding
    --namespace {{ k8s_rbac_namespace }} -o json
  register: k8s_rolebinding_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: k8s_enable_rbac_controls | bool

- name: "6-8. 제한된 RoleBinding 누락 경고 출력"
  ansible.builtin.debug:
    msg: "Restricted RoleBinding {{ k8s_restricted_role_name }}-binding is missing in namespace {{ k8s_rbac_namespace }}."
  when:
    - k8s_enable_rbac_controls | bool
    - not k8s_fail_on_policy_violation | bool
    - k8s_rolebinding_check.rc != 0

- name: "6-9. 제한된 RoleBinding 존재 점검"
  ansible.builtin.assert:
    that:
      - k8s_rolebinding_check.rc == 0
    fail_msg: "Restricted RoleBinding {{ k8s_restricted_role_name }}-binding is missing in namespace {{ k8s_rbac_namespace }}."
    quiet: true
  when:
    - k8s_enable_rbac_controls | bool
    - k8s_fail_on_policy_violation | bool

- name: "6-10. default deny NetworkPolicy 존재 여부 확인"
  ansible.builtin.command: >-
    kubectl --kubeconfig={{ k8s_kubectl_config }}
    get networkpolicy {{ k8s_default_deny_network_policy_name }}
    --namespace {{ k8s_network_policy_namespace }} -o json
  register: k8s_default_deny_network_policy_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: k8s_enable_network_policies | bool

- name: "6-11. default deny NetworkPolicy 누락 경고 출력"
  ansible.builtin.debug:
    msg: "Default deny NetworkPolicy {{ k8s_default_deny_network_policy_name }} is missing in namespace {{ k8s_network_policy_namespace }}."
  when:
    - k8s_enable_network_policies | bool
    - not k8s_fail_on_policy_violation | bool
    - k8s_default_deny_network_policy_check.rc != 0

- name: "6-12. default deny NetworkPolicy 존재 점검"
  ansible.builtin.assert:
    that:
      - k8s_default_deny_network_policy_check.rc == 0
    fail_msg: "Default deny NetworkPolicy {{ k8s_default_deny_network_policy_name }} is missing in namespace {{ k8s_network_policy_namespace }}."
    quiet: true
  when:
    - k8s_enable_network_policies | bool
    - k8s_fail_on_policy_violation | bool

- name: "6-13. default ServiceAccount 토큰 자동 마운트 설정 조회"
  ansible.builtin.command: >-
    kubectl --kubeconfig={{ k8s_kubectl_config }}
    get serviceaccount default --namespace {{ k8s_secret_namespace }} -o json
  register: k8s_default_service_account_json
  changed_when: false
  failed_when: false
  check_mode: false
  when: k8s_enable_secret_controls | bool

- name: "6-14. default ServiceAccount 토큰 자동 마운트 기본값 설정"
  ansible.builtin.set_fact:
    k8s_default_service_account_automount: true
  when: k8s_enable_secret_controls | bool

- name: "6-14-1. default ServiceAccount 토큰 자동 마운트 설정 파싱"
  ansible.builtin.set_fact:
    k8s_default_service_account_automount: "{{ ((k8s_default_service_account_json.stdout | from_json).automountServiceAccountToken | default(true)) | bool }}"
  when:
    - k8s_enable_secret_controls | bool
    - k8s_default_service_account_json.rc | default(1) == 0
    - k8s_default_service_account_json.stdout | default('') | trim is match('^\\{')

- name: "6-15. default ServiceAccount 토큰 자동 마운트 경고 출력"
  ansible.builtin.debug:
    msg: "Default ServiceAccount in namespace {{ k8s_secret_namespace }} still automounts API tokens."
  when:
    - k8s_enable_secret_controls | bool
    - not k8s_fail_on_policy_violation | bool
    - k8s_default_service_account_automount | default(true) | bool

- name: "6-16. default ServiceAccount 토큰 자동 마운트 점검"
  ansible.builtin.assert:
    that:
      - not (k8s_default_service_account_automount | default(true) | bool)
    fail_msg: "Default ServiceAccount in namespace {{ k8s_secret_namespace }} still automounts API tokens."
    quiet: true
  when:
    - k8s_enable_secret_controls | bool
    - k8s_fail_on_policy_violation | bool

- name: "6-17. Secret 목록 조회"
  ansible.builtin.command: "kubectl --kubeconfig={{ k8s_kubectl_config }} get secrets --all-namespaces -o json"
  register: k8s_secrets_json
  changed_when: false
  failed_when: false
  check_mode: false
  when: k8s_enable_secret_controls | bool

- name: "6-18. Secret 목록 기본값 설정"
  ansible.builtin.set_fact:
    k8s_secrets: []
  when: k8s_enable_secret_controls | bool

- name: "6-18-1. Secret 목록 파싱"
  ansible.builtin.set_fact:
    k8s_secrets: "{{ (k8s_secrets_json.stdout | from_json)['items'] | default([]) }}"
  when:
    - k8s_enable_secret_controls | bool
    - k8s_secrets_json.rc | default(1) == 0
    - k8s_secrets_json.stdout | default('') | trim is match('^\\{')

- name: "6-19. Secret 과다 사용 현황 출력"
  ansible.builtin.debug:
    msg: "Secret inventory count: {{ k8s_secrets | default([]) | length }}. Review namespace ownership, unused secrets, and external secret management policy."
  when: k8s_enable_secret_controls | bool
