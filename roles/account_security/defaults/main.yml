# === [A] 계정계 ===
os_security_disable_ssh_root_login: true
#
# Password complexity (pam_pwquality)
os_security_pw_minlen: 12
os_security_pw_ucredit: -1
os_security_pw_lcredit: -1
os_security_pw_dcredit: -1
os_security_pw_ocredit: -1
os_security_pw_retry: 3
os_security_pw_enforce_for_root: true
#
# Account lockout (pam_faillock)
os_security_lockout_enabled: true
os_security_lockout_deny: 5
os_security_lockout_unlock_time: 600   # seconds
#
# PASS_MAX_DAYS
os_security_pass_max_days: 90
#
# rhosts / hosts.equiv
os_security_disable_rhosts: true
#
# === [B] 주요 설정파일 보안설정 ===
# (체크리스트 기준 권한/소유자)
os_security_files:
    /etc/passwd:      { owner: root, group: root, mode: "0644" }
    /etc/shadow:      { owner: root, group: root, mode: "0400" }   # 체크리스트: 400
    /etc/group:       { owner: root, group: root, mode: "0644" }
    /etc/gshadow:     { owner: root, group: root, mode: "0400" }
    /etc/hosts:       { owner: root, group: root, mode: "0644" }
    /etc/services:    { owner: root, group: root, mode: "0644" }   # 체크리스트의 /erc/services 오타 대응
    /etc/rsyslog.conf: { owner: root, group: root, mode: "0644" }

# cron.allow/deny
os_security_cron_allow_users:
    - root
#
# tcp_wrappers 접근제어(체크리스트: /etc/hosts.deny ALL: ALL + allow에 허용 IP)
os_security_tcpwrappers_enabled: true
os_security_hosts_deny_all: true
os_security_hosts_allow_lines:
    - "sshd: 192.168.1.0/24"
    - "sshd: 172.16.10.0/24"
    - "ALL: 127.0.0.1"
#
# PATH 내 '.' 제거(이미 안전해도 강제)
os_security_remove_dot_from_path: true
#
# Time sync (체크리스트: systemd-timesyncd 사용)
os_security_timesyncd_enable: true
#
# === [C] audit(점검만; 자동수정 위험) ===
os_security_audit_enabled: true
os_security_fail_on_audit_findings: false
os_security_audit_log_path: "/var/log/os-security-audit.log"
