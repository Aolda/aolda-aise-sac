---
# roles/docker-security/handlers/main.yml

- name: Restart Docker
  ansible.builtin.service:
    name: docker
    state: restarted

- name: Reload Docker Daemon
  ansible.builtin.systemd:
    daemon_reload: yes
    name: docker
    state: reloaded

# [신규 추가] Auditd 재시작
- name: Restart Auditd
  ansible.builtin.service:
    name: auditd
    state: restarted
    enabled: yes
  # auditd 재시작 실패 시 에러 무시 (컨테이너 환경 등 특수 상황 대비)
  ignore_errors: yes