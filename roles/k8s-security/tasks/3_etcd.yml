---
# CHECK: etcd manifest, pki, 데이터 디렉터리 경로를 대상 Control Plane에서 확인하세요.

- name: "3-1. etcd 저장 데이터 암호화 설정 파일 생성"
  ansible.builtin.copy:
    dest: "{{ k8s_encryption_provider_config }}"
    content: "{{ k8s_encryption_config_content }}"
    owner: root
    group: root
    mode: '0600'
    backup: true
  no_log: true
  when:
    - k8s_enable_encryption_provider_config | bool
    - k8s_apply_etcd_encryption_config | bool
    - k8s_acknowledge_secret_reencryption_required | bool
    - k8s_manage_encryption_config_file | bool
    - k8s_encryption_config_secret | length > 0
  notify: Restart Kubelet

- name: "3-2. 암호화 설정 파일 관리 조건 확인"
  ansible.builtin.assert:
    that:
      - k8s_encryption_config_secret | length > 0
    fail_msg: "k8s_encryption_config_secret is required when k8s_manage_encryption_config_file is true."
    quiet: true
  when:
    - k8s_enable_encryption_provider_config | bool
    - k8s_apply_etcd_encryption_config | bool
    - k8s_manage_encryption_config_file | bool

- name: "3-3. etcd 저장 데이터 암호화 manual-required 안내"
  ansible.builtin.debug:
    msg: >-
      etcd encryption provider config is manual-required.
      Prepare encryption config, backup etcd, apply API server flag, and re-encrypt existing Secrets manually.
  when: >-
    not (
      k8s_enable_encryption_provider_config | bool
      and k8s_apply_etcd_encryption_config | bool
      and k8s_acknowledge_secret_reencryption_required | bool
    )

- name: "3-4. API Server의 etcd 저장 데이터 암호화 설정 (encryption-provider-config)"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: '^\s*- --encryption-provider-config='
    line: "    - --encryption-provider-config={{ k8s_encryption_provider_config }}"
    state: present
    backup: true
  when:
    - k8s_enable_encryption_provider_config | bool
    - k8s_apply_etcd_encryption_config | bool
    - k8s_acknowledge_secret_reencryption_required | bool
    - k8s_apiserver_manifest_exists | bool
  notify: Restart Kubelet

- name: "3-5. API Server의 etcd 연동 통신 TLS 인증서 설정"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    backup: true
  loop: "{{ k8s_apiserver_etcd_tls_args }}"
  when:
    - k8s_apply_etcd_tls | bool
    - k8s_etcd_tls_files_present | bool
    - k8s_apiserver_manifest_exists | bool
  notify: Restart Kubelet

- name: "3-6. etcd 서버 TLS 및 인증 파라미터 적용"
  ansible.builtin.lineinfile:
    path: "{{ k8s_etcd_manifest }}"
    insertafter: '    - etcd'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    backup: true
  loop: "{{ k8s_etcd_server_args }}"
  when:
    - k8s_apply_etcd_tls | bool
    - k8s_etcd_tls_files_present | bool
    - k8s_etcd_manifest_exists | bool
  notify: Restart Kubelet

- name: "3-7. etcd TLS 적용 제외 안내"
  ansible.builtin.debug:
    msg: "etcd TLS settings are skipped because k8s_apply_etcd_tls=false or required certificate files are missing."
  when: not (k8s_apply_etcd_tls | bool and k8s_etcd_tls_files_present | default(false) | bool)

- name: "3-8. K8S-03 etcd 데이터 디렉터리 권한 변경"
  ansible.builtin.file:
    path: "{{ k8s_etcd_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when:
    - k8s_apply_etcd_permissions | bool
    - k8s_etcd_manifest_exists | bool

- name: "3-8-1. K8S-03 etcd 데이터 디렉터리 권한 변경 제외 안내"
  ansible.builtin.debug:
    msg: >-
      etcd data directory permissions are check-only in default mode.
      Set k8s_apply_etcd_permissions=true after etcd backup and node role review.
  when:
    - not k8s_apply_etcd_permissions | bool
    - k8s_etcd_manifest_exists | bool
