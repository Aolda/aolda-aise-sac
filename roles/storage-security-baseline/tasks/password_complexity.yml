---
- name: "Storage 패스워드 복잡도 report"
  ansible.builtin.debug:
    msg:
      - "minlen={{ password_minlen }}"
      - "dcredit={{ password_dcredit }}"
      - "ucredit={{ password_ucredit }}"
      - "lcredit={{ password_lcredit }}"
      - "ocredit={{ password_ocredit }}"
      - "retry={{ password_retry }}"
      - "dictcheck={{ password_dictcheck }}"
      - "mode={{ security_action_mode }}"
  when: enable_storage_password_complexity | bool
  tags:
    - storage_password_complexity

- name: "Storage pwquality 패키지 설치"
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
    update_cache: true
  become: true
  when:
    - enable_storage_password_complexity | bool
    - security_action_mode == 'enforce'
  tags:
    - storage_password_complexity

- name: "Storage pwquality 설정 디렉터리 생성"
  ansible.builtin.file:
    path: "{{ storage_pwquality_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when:
    - enable_storage_password_complexity | bool
    - security_action_mode == 'enforce'
  tags:
    - storage_password_complexity

- name: "Storage pwquality 설정 배포"
  ansible.builtin.template:
    src: pwquality-storage.conf.j2
    dest: "{{ storage_pwquality_config_path }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  when:
    - enable_storage_password_complexity | bool
    - security_action_mode == 'enforce'
  tags:
    - storage_password_complexity
