---
- name: "1-6-1. Keystone м„Өм •нҢҢмқј мғҒнғң нҷ•мқё"
  ansible.builtin.stat:
    path: "{{ keystone_security_config_file }}"
  register: keystone_security_config_validate_stat

- name: "1-6-2. Keystone м„Өм •нҢҢмқј лӮҙмҡ© мЎ°нҡҢ"
  ansible.builtin.slurp:
    path: "{{ keystone_security_config_file }}"
  register: keystone_security_config_validate_raw

- name: "1-6-3. Keystone м„Өм •нҢҢмқј к¶Ңн•ң л°Ҹ н•өмӢ¬ м„Өм • кІҖмҰқ"
  ansible.builtin.assert:
    that:
      - keystone_security_config_validate_stat.stat.exists
      - not (keystone_security_manage_config_permissions | bool) or keystone_security_config_validate_stat.stat.pw_name == keystone_security_config_owner
      - not (keystone_security_manage_config_permissions | bool) or keystone_security_config_validate_stat.stat.gr_name == keystone_security_config_group
      - not (keystone_security_manage_config_permissions | bool) or keystone_security_config_validate_stat.stat.mode == keystone_security_config_mode
      - keystone_security_config_content is search('(?im)^\\s*max_request_body_size\\s*=\\s*' ~ keystone_security_max_request_body_size ~ '\\s*$')
      - not (keystone_security_disable_admin_token | bool) or not (keystone_security_config_content is search('(?im)^\\s*admin_token\\s*='))
      - >-
        not (keystone_security_enable_pki_hash | bool) or
        keystone_security_config_content is search(
          '(?im)^\\s*hash_algorithm\\s*=\\s*' ~ keystone_security_pki_hash_algorithm ~ '\\s*$'
        )
    fail_msg: "Keystone н•өмӢ¬ ліҙм•Ҳ м„Өм • лҳҗлҠ” м„ нғқ м Ғмҡ©н•ң м„Өм •нҢҢмқј к¶Ңн•ңмқҙ кё°лҢҖк°’кіј лӢӨлҰ…лӢҲлӢӨ."
  vars:
    keystone_security_config_content: "{{ keystone_security_config_validate_raw.content | b64decode }}"

- name: "1-6-4. Keystone TLS м„Өм • кІҖмҰқ"
  ansible.builtin.assert:
    that:
      - keystone_security_config_content is search('(?im)^\\s*enable\\s*=\\s*true\\s*$')
      - keystone_security_config_content is search('(?im)^\\s*certfile\\s*=\\s*' ~ keystone_security_certfile | regex_escape ~ '\\s*$')
      - keystone_security_config_content is search('(?im)^\\s*keyfile\\s*=\\s*' ~ keystone_security_keyfile | regex_escape ~ '\\s*$')
      - keystone_security_config_content is search('(?im)^\\s*ca_certs\\s*=\\s*' ~ keystone_security_cafile | regex_escape ~ '\\s*$')
    fail_msg: "Keystone TLS м„Өм •мқҙ кё°лҢҖк°’кіј лӢӨлҰ…лӢҲлӢӨ."
  vars:
    keystone_security_config_content: "{{ keystone_security_config_validate_raw.content | b64decode }}"
  when: keystone_security_enable_tls | bool

- name: "1-6-5. OpenStack CLI нҷҳкІҪ нҢҢмқј нҷ•мқё"
  ansible.builtin.stat:
    path: "{{ keystone_security_openrc_path }}"
  register: keystone_security_openrc

- name: "1-6-6. Keystone endpoint/API кІҖмҰқ"
  ansible.builtin.shell: ". {{ keystone_security_openrc_path }} && openstack token issue -f value -c id"
  args:
    executable: /bin/bash
  register: keystone_security_token_check
  changed_when: false
  failed_when: keystone_security_token_check.rc != 0
  environment: "{{ keystone_security_cli_environment }}"
  when: keystone_security_openrc.stat.exists
