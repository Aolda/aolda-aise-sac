---
# CHECK: DB 소켓 경로와 설정 파일 경로를 대상 DB 서버에서 확인하세요.

- name: "1-1. 익명 사용자(Anonymous) 제거"
  community.mysql.mysql_user:
    name: ''
    host_all: true
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"

- name: "1-2. 테스트 계정(test, guest) 제거"
  community.mysql.mysql_user:
    name: "{{ item }}"
    host_all: true
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"
  loop: "{{ db_test_users }}"

- name: "1-3. 불필요한 DB 계정 제거"
  community.mysql.mysql_user:
    name: "{{ item.name }}"
    host: "{{ item.host | default(omit) }}"
    host_all: "{{ item.host is not defined }}"
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"
  loop: "{{ db_unnecessary_accounts }}"

- name: "1-4. 허용되지 않은 접속 Host/IP 계정 제거"
  community.mysql.mysql_user:
    name: "{{ item.name }}"
    host: "{{ item.host }}"
    state: absent
    login_unix_socket: "{{ db_login_unix_socket }}"
  loop: "{{ db_disallowed_account_hosts }}"

- name: "2-1. MariaDB 패스워드 복잡도 정책 설정 (설정파일 수정)"
  ansible.builtin.blockinfile:
    path: "{{ db_config_file }}"
    marker: "{{ db_password_policy_marker }}"
    insertafter: "[mysqld]"
    block: "{{ db_password_policy_block }}"
  when: db_password_policy_type == "mariadb_simple"
  notify: Restart DB Service

- name: "2-2. MySQL validate_password 컴포넌트 활성화"
  community.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "INSTALL COMPONENT IF NOT EXISTS 'file://component_validate_password'"
  when: db_enable_validate_password_component | bool

- name: "2-3. MySQL validate_password 복잡도 정책 설정 (설정파일 수정)"
  ansible.builtin.blockinfile:
    path: "{{ db_config_file }}"
    marker: "{{ db_validate_password_marker }}"
    insertafter: "[mysqld]"
    block: "{{ db_validate_password_block }}"
  when: db_password_policy_type == "mysql_validate"
  notify: Restart DB Service
