---
# CHECK: kubectl 실행 권한과 PSA 적용 네임스페이스를 대상 Control Plane에서 확인하세요.

- name: "5-1. default 네임스페이스에 PSA Restricted 정책 라벨 적용"
  ansible.builtin.command: >
    kubectl label --overwrite namespace {{ k8s_psa_namespace }}
    pod-security.kubernetes.io/enforce={{ k8s_psa_enforce_level }}
    pod-security.kubernetes.io/warn={{ k8s_psa_warn_level }}
  ignore_errors: true
  changed_when: false

- name: "5-2. 안전한 Pod 배포 템플릿(가이드용) 파일 생성"
  ansible.builtin.copy:
    dest: "{{ k8s_secure_pod_template_path }}"
    owner: root
    group: root
    mode: '0644'
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: secure-pod-example
        namespace: default
      spec:
        hostNetwork: false
        hostPID: false
        hostIPC: false

        containers:
        - name: secure-container
          image: nginx:latest
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: "RuntimeDefault"
