---
# CHECK: auditd 패키지명과 Docker systemd/default 파일 경로를 대상 OS에서 확인하세요.

- name: "Auditd 패키지 설치 확인"
  ansible.builtin.package:
    name: "{{ auditd_package_name }}"
    state: present

- name: "Docker 관련 파일/디렉터리 존재 여부 확인"
  ansible.builtin.stat:
    path: "{{ item }}"
  register: docker_files_stat
  loop: "{{ docker_audit_watch_paths }}"

- name: "Docker 감사 규칙 추가 (/etc/audit/rules.d/audit.rules)"
  ansible.builtin.lineinfile:
    path: "{{ audit_rules_file }}"
    create: true
    line: "-w {{ item.item }} -p wa -k docker"
    state: present
  loop: "{{ docker_files_stat.results }}"
  when: item.stat.exists
  notify: Restart Auditd
