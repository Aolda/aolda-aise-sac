---
- name: "현재 시간 정보 수집 (보고서 파일명 동적 생성 위함)"
  ansible.builtin.setup:
    filter: ansible_date_time
  check_mode: no

- name: "보안조치 결과 마크다운 보고서 렌더링 및 파일 생성"
  ansible.builtin.template:
    src: report.md.j2
    dest: "{{ report_dir }}/{{ report_filename }}"
    mode: "{{ file_mode_644 }}"
  delegate_to: localhost
  check_mode: no