---
# CHECK: 기존 daemon.json이 있으면 docker_daemon_config에 병합할 설정을 먼저 반영하세요.

- name: "4-1. Docker Daemon 설정 디렉터리 확인"
  ansible.builtin.file:
    path: "{{ docker_config_dir }}"
    state: directory
    mode: '0755'

- name: "4-2. daemon.json 종합 보안 설정 적용"
  ansible.builtin.copy:
    dest: "{{ docker_daemon_config_path }}"
    content: "{{ docker_daemon_config | to_nice_json }}\n"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Docker
