---
# roles/db-security/tasks/1_accounts_password.yml

# ==============================================================================
# ### [CHECK] 사전 확인 필요 사항 ###
# 1. DB 소켓 경로: 보통 /var/lib/mysql/mysql.sock 또는 /tmp/mysql.sock
# 2. 설정 파일 경로: /etc/my.cnf 또는 /etc/mysql/mariadb.conf.d/50-server.cnf 등
# ==============================================================================

- name: "1-1. 익명 사용자(Anonymous) 제거"
  community.mysql.mysql_user:
    name: ''
    host_all: yes
    state: absent
    # ### [CHECK] 실제 소켓 경로로 수정하세요 ###
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: "1-2. 테스트 계정(test, guest) 제거"
  community.mysql.mysql_user:
    name: "{{ item }}"
    host_all: yes
    state: absent
    # ### [CHECK] 실제 소켓 경로로 수정하세요 ###
    login_unix_socket: /var/lib/mysql/mysql.sock
  loop:
    - test
    - guest

- name: "2-1. 패스워드 복잡도 정책 설정 (설정파일 수정)"
  ansible.builtin.blockinfile:
    # ### [CHECK] 실제 사용하는 DB 설정 파일 경로로 수정하세요 ###
    path: /etc/my.cnf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Password Policy"
    # ### [CHECK] 설정 파일 내 [mysqld] 섹션이 있는지 확인하세요 ###
    insertafter: "[mysqld]"
    block: |
      # MariaDB 10.4 이상 권장 설정 (버전에 따라 플러그인 이름 확인 필요)
      plugin-load-add=simple_password_check.so
      simple_password_check_minimal_length=8
      simple_password_check_digits=1
      simple_password_check_letters_same_case=1
      simple_password_check_other_characters=1
  # ### [CHECK] handlers/main.yml에 정의된 이름과 같아야 합니다 ###
  notify: Restart DB Service