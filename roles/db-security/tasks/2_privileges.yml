---
# CHECK: 권한을 제한할 실제 일반 DB 계정을 db_regular_users에 지정하세요.
# db_privilege_exempt_users는 권한 회수 예외 목록입니다.
# 계정 삭제 보호는 db_account_delete_protected_users 계열 변수로 별도 관리합니다.

- name: "3-1. 일반 사용자에게서 GRANT OPTION 권한 회수"
  ansible.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "{{ db_revoke_grant_option_query }}"
  vars:
    db_revoke_grant_option_query: >-
      REVOKE GRANT OPTION ON *.* FROM
      '{{ item.name if item is mapping else item }}'@'{{ item.host | default('%') if item is mapping else '%' }}'
  loop: "{{ db_regular_users }}"
  when:
    - db_changes_allowed | bool
    - db_regular_users | length > 0
    - (item.name if item is mapping else item) not in db_privilege_exempt_users

- name: "4-1. mysql.user 테이블에 대한 접근(Select) 권한 회수"
  ansible.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "{{ db_revoke_user_table_query }}"
  vars:
    db_revoke_user_table_query: >-
      REVOKE {{ db_user_table_revoke_privileges }} ON mysql.user FROM
      '{{ item.name if item is mapping else item }}'@'{{ item.host | default('%') if item is mapping else '%' }}'
  loop: "{{ db_regular_users }}"
  when:
    - db_changes_allowed | bool
    - db_regular_users | length > 0
    - (item.name if item is mapping else item) not in db_privilege_exempt_users

- name: "4-2. 권한 변경 사항 적용"
  ansible.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "FLUSH PRIVILEGES"
  when:
    - db_changes_allowed | bool
    - db_regular_users | length > 0
