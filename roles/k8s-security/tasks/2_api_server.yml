---
# CHECK: kube-apiserver, kube-scheduler, kube-controller-manager manifest 경로를 확인하세요.

- name: "2-1. API Server 인증/인가 보안 파라미터 적용"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop: "{{ k8s_apiserver_auth_args }}"
  notify: Restart Kubelet

- name: "2-2. 취약한 Token 기반 인증 파일 설정 제거"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    regexp: '^\s*- --token-auth-file=.*'
    state: absent
  notify: Restart Kubelet

- name: "2-3. Scheduler 및 Controller Manager 외부 오픈 금지 (bind-address)"
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    insertafter: "{{ item.after }}"
    regexp: '^\s*- --bind-address='
    line: "    - --bind-address={{ item.bind_address }}"
    state: present
  loop:
    - path: "{{ k8s_scheduler_manifest }}"
      after: '    - kube-scheduler'
      bind_address: "{{ k8s_scheduler_bind_address }}"
    - path: "{{ k8s_controller_manager_manifest }}"
      after: '    - kube-controller-manager'
      bind_address: "{{ k8s_controller_manager_bind_address }}"
  notify: Restart Kubelet

- name: "2-4. 필수 Admission Control Plugin 활성화"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: '^\s*- --enable-admission-plugins='
    line: "    - --enable-admission-plugins={{ k8s_apiserver_enable_admission_plugins }}"
    state: present
  notify: Restart Kubelet

- name: "2-5. 취약한 Admission Control Plugin 비활성화"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: '^\s*- --disable-admission-plugins='
    line: "    - --disable-admission-plugins={{ k8s_apiserver_disable_admission_plugins }}"
    state: present
  notify: Restart Kubelet

- name: "2-6. Admission Control Config 파일 지정"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: '^\s*- --admission-control-config-file='
    line: "    - --admission-control-config-file={{ k8s_admission_control_config_file }}"
    state: present
  when: k8s_enable_admission_control_config | bool

- name: "2-7. API Server SSL/TLS 및 암호화 수준 강화"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop: "{{ k8s_apiserver_tls_args }}"
  notify: Restart Kubelet

- name: "2-8. API Server Audit 로그 디렉터리 생성"
  ansible.builtin.file:
    path: "{{ k8s_audit_log_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: k8s_enable_audit_log | bool

- name: "2-9. API Server Audit Policy 파일 생성"
  ansible.builtin.copy:
    dest: "{{ k8s_audit_policy_file }}"
    content: "{{ k8s_audit_policy_content }}"
    owner: root
    group: root
    mode: '0600'
    backup: true
  when:
    - k8s_enable_audit_log | bool
    - k8s_manage_audit_policy_file | bool
  notify: Restart Kubelet

- name: "2-10. API Server Audit(감사) 로그 활성화"
  ansible.builtin.lineinfile:
    path: "{{ k8s_apiserver_manifest }}"
    insertafter: '    - kube-apiserver'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - regexp: '^\s*- --audit-policy-file='
      line: '    - --audit-policy-file={{ k8s_audit_policy_file }}'
    - regexp: '^\s*- --audit-log-path='
      line: '    - --audit-log-path={{ k8s_audit_log_path }}'
    - regexp: '^\s*- --audit-log-maxage='
      line: '    - --audit-log-maxage={{ k8s_audit_log_maxage }}'
    - regexp: '^\s*- --audit-log-maxbackup='
      line: '    - --audit-log-maxbackup={{ k8s_audit_log_maxbackup }}'
    - regexp: '^\s*- --audit-log-maxsize='
      line: '    - --audit-log-maxsize={{ k8s_audit_log_maxsize }}'
  when: k8s_enable_audit_log | bool
  notify: Restart Kubelet
