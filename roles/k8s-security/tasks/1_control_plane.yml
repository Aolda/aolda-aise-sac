---
# CHECK: kubeadm 정적 파드 manifest 및 인증서 경로를 대상 Control Plane에서 확인하세요.

- name: "1-1. Controller 인증 및 SSL/TLS 파라미터 설정"
  ansible.builtin.lineinfile:
    path: "{{ k8s_controller_manager_manifest }}"
    insertafter: '    - kube-controller-manager'
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop: "{{ k8s_controller_manager_args }}"
  notify: Restart Kubelet

- name: "1-2. Master 노드 주요 환경설정 파일 권한 설정 (644)"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ k8s_master_config_files }}"
  ignore_errors: true

- name: "1-3. pki 디렉터리 내 인증서(.crt) 파일 탐색"
  ansible.builtin.find:
    paths: "{{ k8s_pki_dir }}"
    patterns: "*.crt"
    recurse: yes
  register: crt_files

- name: "1-4. 인증서 파일(.crt) 권한 644 설정"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ crt_files.files }}"

- name: "1-5. pki 디렉터리 내 키(.key) 파일 탐색"
  ansible.builtin.find:
    paths: "{{ k8s_pki_dir }}"
    patterns: "*.key"
    recurse: yes
  register: key_files

- name: "1-6. 키 파일(.key) 권한 600 설정"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: '0600'
  loop: "{{ key_files.files }}"

- name: "1-7. etcd 데이터 디렉터리 권한 700 설정"
  ansible.builtin.file:
    path: "{{ k8s_etcd_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: "1-8. Kubernetes 버전 점검 (보안 패치 확인용)"
  ansible.builtin.command: kubectl version --short
  register: k8s_version
  changed_when: false

- name: "1-9. 현재 Kubernetes 버전 출력"
  ansible.builtin.debug:
    msg: "현재 설치된 K8s 버전입니다. 최신 보안 패치가 적용되었는지 확인하세요: {{ k8s_version.stdout }}"
