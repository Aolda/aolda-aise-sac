---
# roles/docker-security/tasks/1_version_and_users.yml

# ==============================================================================
# ### [CHECK] 사전 확인 필요 사항 ###
# 1. 패키지 매니저: apt(Ubuntu/Debian) 또는 yum/dnf(CentOS/RHEL) 확인
# 2. 도커 패키지명: docker-ce, docker.io, docker 등 설치된 이름 확인
# 3. 도커 그룹명: 보통 'docker'이지만, 아주 구버전은 'dockerroot'일 수 있음
# 4. 허용 계정: root 외에 docker 명령어를 써야 하는 실제 관리자 계정 목록
# ==============================================================================

# [1. 도커 최신 보안 패치 적용]
# 가이드: 보안 취약점이 없는 최신 버전으로 업데이트
# 주의: 운영 중인 컨테이너에 영향이 있을 수 있으므로 점검 후 실행 권장

- name: "1-1. Docker 패키지 최신 버전 업데이트 (RHEL/CentOS)"
  ansible.builtin.yum:
    # ### [CHECK] 설치된 패키지명이 docker-ce 인지 docker 인지 확인 ###
    name: docker-ce
    state: latest
  when: ansible_os_family == "RedHat"
  # notify: Restart Docker  <-- 업데이트 시 서비스 재시작으로 컨테이너 중단 위험 있음 (주석 처리)

- name: "1-1. Docker 패키지 최신 버전 업데이트 (Debian/Ubuntu)"
  ansible.builtin.apt:
    # ### [CHECK] 설치된 패키지명이 docker.io 인지 docker-ce 인지 확인 ###
    name: docker-ce
    state: latest
    update_cache: yes
  when: ansible_os_family == "Debian"

# [2. 도커 그룹에 불필요한 사용자 제거]
# 가이드: 도커 그룹에 속한 사용자 중 불필요한 계정 제거
# 방식: 'members' 옵션을 사용하여 아래 리스트에 없는 사용자는 그룹에서 강제 퇴출(Exclusive 방식)

- name: "2-1. Docker 그룹 멤버 정의 (허용된 사용자 외 모두 제거)"
  ansible.builtin.group:
    # ### [CHECK] /etc/group 에서 그룹명이 docker 인지 dockerroot 인지 확인 ###
    name: docker
    state: present
    # ### [CHECK] 아래 리스트에 docker를 사용할 실제 계정만 남기세요 ###
    members:
      - root
      - 'admin_user'  # 예시: 실제 운영자 ID
      - 'cicd_agent'  # 예시: 배포 담당 계정