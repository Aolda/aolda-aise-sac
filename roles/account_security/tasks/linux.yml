# root 원격접속 제한 (sshd_config)
- name: account_security | check PermitRootLogin
  ansible.builtin.command: >
        sh -lc "sshd -T 2>/dev/null | grep -i '^permitrootlogin ' || true"
  register: permitrootlogin_out
  changed_when: false

- name: account_security | audit result for PermitRootLogin
  ansible.builtin.set_fact:
     permitrootlogin_ok: "{{ ('permitrootlogin ' ~ account_security_permit_root_login) in (permitrootlogin_out.stdout | lower) }}"

- name: account_security | FAIL/WARN if PermitRootLogin not compliant
  ansible.builtin.fail:
    msg: "PermitRootLogin not compliant. Got: {{ permitrootlogin_out.stdout }}"
  when: security_mode == "audit" and (not permitrootlogin_ok) and security_fail_on_violation

- name: account_security | enforce PermitRootLogin
  ansible.builtin.lineinfile:
    path: "{{ account_security_ssh_config_path }}"
    regexp: '^\s*PermitRootLogin\s+'
    line: "PermitRootLogin {{ account_security_permit_root_login }}"
    create: false
    notify: restart sshd
    when: security_mode == "enforce"
