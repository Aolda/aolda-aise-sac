---
- name: "Storage 패스워드 사용 기간 대상 산정"
  ansible.builtin.set_fact:
    storage_password_age_effective_users: "{{ password_age_target_users | difference(password_age_excluded_users) }}"
  when: enable_storage_password_age | bool
  tags:
    - storage_password_age

- name: "Storage 패스워드 사용 기간 report"
  ansible.builtin.debug:
    msg:
      - "max_days={{ password_max_days }}"
      - "min_days={{ password_min_days }}"
      - "warn_age={{ password_warn_age }}"
      - "target_users={{ storage_password_age_effective_users | default([]) | join(',') }}"
      - "apply_existing={{ password_age_apply_existing_users }}"
      - "mode={{ security_action_mode }}"
  when: enable_storage_password_age | bool
  tags:
    - storage_password_age

- name: "Storage 사용자별 chage 상태 조회"
  ansible.builtin.command:
    argv:
      - chage
      - -l
      - "{{ item }}"
  loop: "{{ storage_password_age_effective_users | default([]) }}"
  register: storage_chage_report
  changed_when: false
  failed_when: false
  when: enable_storage_password_age | bool
  tags:
    - storage_password_age

- name: "Storage 패스워드 사용 기간 적용"
  ansible.builtin.command:
    argv:
      - chage
      - -M
      - "{{ password_max_days | string }}"
      - -m
      - "{{ password_min_days | string }}"
      - -W
      - "{{ password_warn_age | string }}"
      - "{{ item }}"
  loop: "{{ storage_password_age_effective_users | default([]) }}"
  become: true
  register: storage_chage_apply
  changed_when: storage_chage_apply.rc == 0
  when:
    - enable_storage_password_age | bool
    - password_age_apply_existing_users | bool
    - security_action_mode == 'enforce'
  tags:
    - storage_password_age
