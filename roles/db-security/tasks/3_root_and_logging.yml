---
# CHECK: DB 설정 파일 경로와 로그 저장 경로를 대상 DB 서버에서 확인하세요.

- name: "1-1. DB 구동 계정을 mysql로 강제 설정"
  ansible.builtin.lineinfile:
    path: "{{ db_config_file }}"
    regexp: '^user\s*='
    line: "user = {{ db_runtime_user }}"
    insertafter: '\[mysqld\]'
    state: present
  notify: Restart DB Service

- name: "2-1. 설정 파일 권한을 640으로 설정 (root:mysql)"
  ansible.builtin.file:
    path: "{{ db_config_file }}"
    owner: root
    group: "{{ db_runtime_group }}"
    mode: '0640'

- name: "3-1. 로그 저장 디렉터리 생성 및 권한 설정"
  ansible.builtin.file:
    path: "{{ db_log_dir }}"
    state: directory
    owner: "{{ db_runtime_user }}"
    group: "{{ db_runtime_group }}"
    mode: '0750'

- name: "3-2. Slow Query Log 활성화 설정 추가"
  ansible.builtin.blockinfile:
    path: "{{ db_config_file }}"
    marker: "{{ db_logging_marker }}"
    insertafter: "[mysqld]"
    block: |
      slow_query_log = 1
      slow_query_log_file = {{ db_slow_query_log_file }}
      long_query_time = {{ db_long_query_time }}
      log_error = {{ db_error_log_file }}
  notify: Restart DB Service
