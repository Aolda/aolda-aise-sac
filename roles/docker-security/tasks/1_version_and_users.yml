---
# CHECK: 대상 OS의 패키지명, Docker 그룹명, 허용 계정을 확인하세요.

- name: "1-1. Docker 패키지 최신 버전 업데이트 (RHEL/CentOS)"
  ansible.builtin.yum:
    name: "{{ docker_package_name_redhat }}"
    state: latest
  when: ansible_os_family == "RedHat"

- name: "1-1. Docker 패키지 최신 버전 업데이트 (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: "{{ docker_package_name_debian }}"
    state: latest
    update_cache: true
  when: ansible_os_family == "Debian"

- name: "2-1. Docker 그룹 생성 확인"
  ansible.builtin.group:
    name: "{{ docker_group_name }}"
    state: present

- name: "2-2. 허용된 사용자를 Docker 그룹에 추가"
  ansible.builtin.user:
    name: "{{ item }}"
    groups: "{{ docker_group_name }}"
    append: true
  loop: "{{ docker_allowed_users }}"
  when: item != 'root'

- name: "도커 콘텐츠 신뢰성 활성화 (DOCKER_CONTENT_TRUST)"
  ansible.builtin.lineinfile:
    path: "{{ docker_content_trust_profile }}"
    create: true
    line: "export DOCKER_CONTENT_TRUST=1"
    owner: root
    group: root
    mode: '0644'
  when: docker_enable_content_trust | bool
