---
# defaults file for db_security
---
# [DB-01, 03, 04] 점검 및 조치가 필요한 계정 리스트
# 가이드: 불필요한 계정 삭제 및 권한 오남용 방지
db_unnecessary_users: 
  - 'test'
  - 'guest'

db_revoke_grant_users:
  - { user: 'app_user', host: 'localhost' }

db_restrict_table_access_users:
  - { user: 'developer_user', host: '%' }


# [DB-07] 안전한 패스워드 암호화 알고리즘 적용 대상
# 가이드: SHA-256(caching_sha2_password) 미사용 계정 조사 후 입력
db_sha2_target_users:
  - { user: 'app_user', host: 'localhost', password: '초기패스워드설정' }


# [DB-08] 로그 파일 저장 경로 설정
# 가이드: 서버 내 디스크 용량을 확인하여 적절한 경로 지정
db_log_path_general: "/var/log/mysql/general.log"
db_log_path_slow: "/var/log/mysql/slow.log"