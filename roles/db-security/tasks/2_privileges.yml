---
# CHECK: 권한을 제한할 실제 일반 DB 계정을 db_regular_users에 지정하세요.

- name: "3-1. 일반 사용자에게서 GRANT OPTION 권한 회수"
  community.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "REVOKE GRANT OPTION ON *.* FROM '{{ item.name if item is mapping else item }}'@'{{ item.host | default('%') if item is mapping else '%' }}'"
  loop: "{{ db_regular_users }}"
  when: db_regular_users | length > 0

- name: "4-1. mysql.user 테이블에 대한 접근(Select) 권한 회수"
  community.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "REVOKE {{ db_user_table_revoke_privileges }} ON mysql.user FROM '{{ item.name if item is mapping else item }}'@'{{ item.host | default('%') if item is mapping else '%' }}'"
  loop: "{{ db_regular_users }}"
  when: db_regular_users | length > 0

- name: "4-2. 권한 변경 사항 적용"
  community.mysql.mysql_query:
    login_unix_socket: "{{ db_login_unix_socket }}"
    query: "FLUSH PRIVILEGES"
  when: db_regular_users | length > 0
