---
- name: Prepare Ubuntu hosts for kubeadm Kubernetes
  hosts: k8s
  become: true
  gather_facts: true
  vars:
    kubernetes_apt_repo_version: v1.33
    kube_pod_network_cidr: 10.244.0.0/16
    kube_apiserver_advertise_address: "{{ hostvars[groups['k8s_control_plane'][0]].k8s_private_ip }}"
    kubeconfig_user: ubuntu
    kubeconfig_home: /home/ubuntu
    kubernetes_key_url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_repo_version }}/deb/Release.key"
    kubernetes_keyring_path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    flannel_manifest_url: "https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml"

  pre_tasks:
    - name: Assert supported distribution
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
          - ansible_facts.distribution_version is version("24.04", ">=")
        fail_msg: "This playbook is intended for Ubuntu 24.04 or newer hosts."

  tasks:
    - name: Install OS prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - containerd
          - curl
          - gpg
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      when: ansible_facts.swaptotal_mb | int > 0
      changed_when: true

    - name: Disable swap entries in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#]\S+\s+\S+\s+swap\s+\S+.*)$'
        replace: '# \1'
        backup: true

    - name: Persist Kubernetes kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          overlay
          br_netfilter

    - name: Load overlay module
      community.general.modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter module
      community.general.modprobe:
        name: br_netfilter
        state: present

    - name: Configure Kubernetes sysctl settings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
      notify: Reload sysctl

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check containerd config
      ansible.builtin.stat:
        path: /etc/containerd/config.toml
      register: containerd_config_stat

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      args:
        executable: /bin/bash
      when: not containerd_config_stat.stat.exists
      changed_when: true
      notify: Restart containerd

    - name: Enable systemd cgroup for containerd
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
        backup: true
      notify: Restart containerd

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Kubernetes apt repository key
      ansible.builtin.get_url:
        url: "{{ kubernetes_key_url }}"
        dest: /tmp/kubernetes-release.key
        owner: root
        group: root
        mode: "0644"

    - name: Install Kubernetes apt repository keyring
      ansible.builtin.command:
        cmd: "gpg --dearmor -o {{ kubernetes_keyring_path }} /tmp/kubernetes-release.key"
        creates: "{{ kubernetes_keyring_path }}"
      changed_when: false

    - name: Configure Kubernetes apt repository
      ansible.builtin.deb822_repository:
        name: kubernetes
        types:
          - deb
        uris:
          - "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_repo_version }}/deb/"
        suites:
          - /
        signed_by: "{{ kubernetes_keyring_path }}"
        state: present

    - name: Update apt cache after adding Kubernetes repository
      ansible.builtin.apt:
        update_cache: true

    - name: Install Kubernetes packages
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true

    - name: Hold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started

    - name: Enable kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: true

  handlers:
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted

- name: Initialize Kubernetes control plane
  hosts: k8s_control_plane
  become: true
  gather_facts: false
  vars:
    kube_pod_network_cidr: 10.244.0.0/16
    kubeconfig_user: ubuntu
    kubeconfig_home: /home/ubuntu
    flannel_manifest_url: "https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml"

  tasks:
    - name: Check whether control plane is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Initialize control plane with kubeadm
      ansible.builtin.command:
        cmd: >-
          kubeadm init
          --apiserver-advertise-address={{ k8s_private_ip }}
          --pod-network-cidr={{ kube_pod_network_cidr }}
          --cri-socket=unix:///run/containerd/containerd.sock
      when: not kubeadm_admin_conf.stat.exists
      changed_when: true

    - name: Ensure kubeconfig directory exists for ubuntu
      ansible.builtin.file:
        path: "{{ kubeconfig_home }}/.kube"
        state: directory
        owner: "{{ kubeconfig_user }}"
        group: "{{ kubeconfig_user }}"
        mode: "0755"

    - name: Configure kubeconfig for ubuntu
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ kubeconfig_home }}/.kube/config"
        remote_src: true
        owner: "{{ kubeconfig_user }}"
        group: "{{ kubeconfig_user }}"
        mode: "0600"

    - name: Wait for Kubernetes API server
      ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes
      register: kube_api_wait
      changed_when: false
      retries: 30
      delay: 5
      until: kube_api_wait.rc == 0

    - name: Install Flannel CNI
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f {{ flannel_manifest_url }}"
      register: flannel_apply
      changed_when: >-
        'created' in flannel_apply.stdout or
        'configured' in flannel_apply.stdout
      failed_when: flannel_apply.rc != 0

    - name: Create kubeadm join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: kubeadm_join_command
      changed_when: false

- name: Join worker nodes to Kubernetes cluster
  hosts: k8s_worker
  become: true
  gather_facts: false

  tasks:
    - name: Check whether worker already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join worker to cluster
      ansible.builtin.command:
        cmd: >-
          {{ hostvars[groups['k8s_control_plane'][0]].kubeadm_join_command.stdout }}
          --cri-socket=unix:///run/containerd/containerd.sock
      when: not kubelet_conf.stat.exists
      changed_when: true

- name: Verify Kubernetes cluster
  hosts: k8s_control_plane
  become: true
  gather_facts: false

  tasks:
    - name: Wait for all Kubernetes nodes to become Ready
      ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes --no-headers
      register: kube_nodes_ready
      changed_when: false
      retries: 24
      delay: 10
      until:
        - kube_nodes_ready.rc == 0
        - kube_nodes_ready.stdout_lines | select('search', '\\sReady\\s') | list | length == groups['k8s'] | length
        - kube_nodes_ready.stdout is not search('NotReady')

    - name: Get Kubernetes nodes
      ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes -o wide
      register: kubectl_nodes
      changed_when: false

    - name: Show Kubernetes nodes
      ansible.builtin.debug:
        var: kubectl_nodes.stdout_lines
