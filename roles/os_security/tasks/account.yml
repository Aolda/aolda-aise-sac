---
# 계정 및 인증 통제 영역

- name: "OpenSSH 서버 설치 여부 사전 점검"
  ansible.builtin.shell: dpkg-l | grep -E "^ii" | grep -q "openssh-server"
  register: ssh_check
  failed_when: false
  changed_when: false

- name: "OpenSSH 서버가 없을 경우에만 설치 진행"
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: yes  # 패키지가 없을 때만 캐시를 업데이트하므로 효율적입니다.
  when: ssh_check.rc != 0

- name: "SSH 권한 분리 디렉토리 생성 확인"
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: "{{ file_owner_root }}"
    group: "{{ file_group_root }}"
    mode: "{{ file_mode_755 }}"
  
- name: "SSH 설정 파일에서 root 원격 접속 제한"
  ansible.builtin.lineinfile:
    path: "{{ path_sshd_config }}"
    regexp: '^#?\s*PermitRootLogin\s+'
    line: "PermitRootLogin {{ sshd_permit_root_login }}"
    state: present
    validate: 'sshd -t -f %s'
  notify: restart ssh

- name: "패스워드 최대 사용 기간 설정"
  ansible.builtin.lineinfile:
    path: "{{ path_login_defs }}"
    regexp: '^PASS_MAX_DAYS'
    line: "PASS_MAX_DAYS {{ os_pass_max_days }}"
    state: present

- name: "패스워드 복잡도 정책 및 root 적용 강제"
  ansible.builtin.lineinfile:
    path: "{{ path_pam_password }}"
    regexp: '^password\s+requisite\s+pam_pwquality.so'
    line: "password requisite pam_pwquality.so enforce_for_root retry={{ pam_pwquality_retry }} minlen={{ pam_pwquality_minlen }} lcredit={{ pam_pwquality_lcredit }} ucredit={{ pam_pwquality_ucredit }} dcredit={{ pam_pwquality_dcredit }} ocredit={{ pam_pwquality_ocredit }}"
    state: present

- name: "로그인 실패 시 계정 잠금 임계값 설정 (Ubuntu 22.04 faillock 대응)"
  ansible.builtin.lineinfile:
    path: "{{ path_pam_auth }}"
    regexp: '^\s*auth\s+\[success=1\s+default=ignore\]\s+pam_unix.so'
    insertbefore: '^\s*auth\s+\[success=1\s+default=ignore\]\s+pam_unix.so'
    line: "auth required pam_faillock.so preauth silent deny={{ pam_deny_count }} unlock_time={{ pam_unlock_time }}"
    state: present