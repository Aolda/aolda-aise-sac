---
- name: "Ceph keyring 상태 조회"
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ ceph_keyring_policy }}"
  register: ceph_keyring_stat
  when: enable_ceph_keyring_hardening | bool
  tags:
    - ceph_keyring

- name: "Ceph keyring report"
  ansible.builtin.debug:
    msg:
      - "report_only={{ ceph_keyring_report_only }}"
      - "mode={{ security_action_mode }}"
      - "{{ ceph_keyring_stat.results | default([]) | map(attribute='stat') | list }}"
  when: enable_ceph_keyring_hardening | bool
  tags:
    - ceph_keyring

- name: "Ceph keyring 권한 적용"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    state: file
  loop: "{{ ceph_keyring_policy }}"
  become: true
  when:
    - enable_ceph_keyring_hardening | bool
    - not ceph_keyring_report_only | bool
    - security_action_mode == 'enforce'
  tags:
    - ceph_keyring
