---
# KVM 계정 감시 메인 태스크
# 목적: 30일 이상 미사용 KVM 제어 계정을 식별하고 보고서/자동화 스크립트 생성

- name: "KVM 계정 감시 - 초기화"
  debug:
    msg: "KVM 계정 감시 프로세스 시작"

# Step 1: 보고서 디렉토리 생성
- name: "보고서 디렉토리 생성"
  file:
    path: "{{ kvm_account_audit.report_dir }}"
    state: directory
    mode: '0755'
  become: yes

# Step 2: KVM 제어 계정 추출 (lastlog 기반 미접속 기간 계산)
- name: "KVM 제어 계정 및 마지막 접속 정보 조회"
  shell: |
    set -e
    
    # 타겟 그룹의 모든 사용자 조회
    declare -a target_groups=({{ kvm_account_audit.target_groups | join(' ') }})
    declare -a inactivity_users=()
    
    # 현재 시간 (Unix timestamp)
    current_time=$(date +%s)
    threshold_seconds=$(({{ kvm_account_audit.inactivity_threshold_days }} * 86400))
    
    for group in "${target_groups[@]}"; do
      # 그룹 멤버 조회
      group_members=$(getent group "$group" 2>/dev/null | cut -d: -f4 | tr ',' '\n' | grep -v '^$')
      
      while read -r user; do
        [ -z "$user" ] && continue
        
        # lastlog에서 마지막 접속 시간 조회
        lastlog_output=$(lastlog -t {{ kvm_account_audit.inactivity_threshold_days }}d -u "$user" 2>/dev/null || echo "Never logged in")
        
        if [ "$lastlog_output" = "Never logged in" ]; then
          # 계정 생성일 확인
          user_info=$(getent passwd "$user")
          if [ ! -z "$user_info" ]; then
            # 계정 상태 확인 (잠금 여부)
            account_status=$(passwd -S "$user" 2>/dev/null | awk '{print $2}' || echo "unknown")
            if [ "$account_status" != "L" ]; then
              inactivity_users+=("$user|Never|9999")
            fi
          fi
        else
          # lastlog 출력에서 날짜 추출 (형식: user    pts/0                    192.168.1.1 xxx xxx xx xx:xx)
          last_login_date=$(echo "$lastlog_output" | awk 'NR==2 {print $3, $4, $5, $6}' 2>/dev/null || echo "")
          if [ ! -z "$last_login_date" ]; then
            last_login_time=$(date -d "$last_login_date" +%s 2>/dev/null || echo "0")
            inactivity_days=$(( ($current_time - $last_login_time) / 86400 ))
            
            if [ $inactivity_days -ge {{ kvm_account_audit.inactivity_threshold_days }} ]; then
              inactivity_users+=("$user|$last_login_date|$inactivity_days")
            fi
          fi
        fi
      done <<< "$group_members"
    done
    
    # 결과 출력 (내림차순 정렬)
    printf '%s\n' "${inactivity_users[@]}" | sort -t'|' -k3 -rn
  args:
    executable: /bin/bash
  register: inactivity_accounts_raw
  changed_when: false
  become: yes

# Step 3: 미사용 계정 파싱 및 리스트 생성
- name: "미사용 계정 리스트 생성"
  set_fact:
    inactivity_accounts: "{{ inactivity_accounts_raw.stdout_lines | map('split', '|') | list }}"

- name: "미사용 계정 수 확인"
  debug:
    msg: "발견된 미사용 계정: {{ inactivity_accounts | length }}개"

# Step 4: 조건부 처리 - 미사용 계정이 없으면 작업 종료
- name: "미사용 계정이 없는 경우 작업 종료"
  block:
    - name: "작업 완료 메시지"
      debug:
        msg: "30일 이상 미사용 KVM 계정이 없습니다. 작업을 완료합니다."
  when: inactivity_accounts | length == 0

# Step 5: 60일 이상 미사용 계정 필터링 및 자동 잠금
- name: "60일 이상 미사용 계정 식별"
  set_fact:
    restriction_accounts: "{{ inactivity_accounts | selectattr('2', 'ge', kvm_account_audit.restriction_threshold_days | string) | list }}"
  when: inactivity_accounts | length > 0

- name: "60일 이상 미사용 계정 자동 잠금 처리"
  user:
    name: "{{ item[0] }}"
    password_lock: yes
  loop: "{{ restriction_accounts }}"
  become: yes
  when: inactivity_accounts | length > 0 and restriction_accounts | length > 0
  register: locked_accounts_result

- name: "잠금 처리된 계정 리스트 생성"
  set_fact:
    locked_accounts: "{{ restriction_accounts | map(attribute='0') | list }}"
  when: inactivity_accounts | length > 0

- name: "자동 잠금 완료 로그"
  debug:
    msg: 
      - "✓ 60일 이상 미사용 계정 자동 잠금 완료"
      - "  잠금된 계정: {{ locked_accounts | join(', ') }}"
  when: inactivity_accounts | length > 0 and locked_accounts | length > 0

# Step 6: 미사용 계정이 있는 경우 - 보고서 생성
- name: "KVM 계정 감시 보고서 생성"
  template:
    src: account_audit_report.j2
    dest: "{{ kvm_account_audit.report_dir }}/kvm_account_audit_{{ ansible_date_time.iso8601_basic_short }}.md"
    mode: '0644'
  become: yes
  when: inactivity_accounts | length > 0
  register: audit_report

# Step 7: 자동 적용 스크립트 생성
- name: "자동 적용 스크립트 템플릿 렌더링"
  template:
    src: apply_account_restrictions.j2
    dest: /tmp/apply_account_restrictions.sh.tmp
    mode: '0600'
  when: inactivity_accounts | length > 0
  register: temp_script

# Step 8: 스크립트를 현재 사용자 홈 디렉토리에 배포
- name: "현재 사용자 조회"
  set_fact:
    current_user: "{{ ansible_user_id }}"
  when: inactivity_accounts | length > 0

- name: "자동 적용 스크립트 배포"
  copy:
    src: /tmp/apply_account_restrictions.sh.tmp
    dest: "/home/{{ current_user }}/apply_account_restrictions_{{ ansible_date_time.iso8601_basic_short }}.sh"
    mode: '0755'
    remote_src: yes
  when: inactivity_accounts | length > 0

- name: "임시 스크립트 파일 삭제"
  file:
    path: /tmp/apply_account_restrictions.sh.tmp
    state: absent
  when: inactivity_accounts | length > 0

# Step 9: 보고서 및 스크립트 경로 출력
- name: "생성 완료 - 결과 정보"
  debug:
    msg:
      - "✓ 감시 보고서: {{ audit_report.dest }}"
      - "✓ 자동 적용 스크립트: /home/{{ current_user }}/apply_account_restrictions_{{ ansible_date_time.iso8601_basic_short }}.sh"
      - "→ 스크립트 실행 방법: bash apply_account_restrictions_*.sh <username>"
  when: inactivity_accounts | length > 0
