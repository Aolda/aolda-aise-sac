---
# CHECK: Docker systemd unit 및 socket 경로를 대상 OS에서 확인하세요.

- name: "3-0. Docker systemd 및 socket 파일 존재 여부 확인"
  ansible.builtin.stat:
    path: "{{ item }}"
  register: docker_permission_files
  loop:
    - "{{ docker_service_unit_path }}"
    - "{{ docker_socket_unit_path }}"
    - "{{ docker_socket_path }}"

- name: "3-1. docker.service 소유권(root:root) 및 권한(644) 설정"
  ansible.builtin.file:
    path: "{{ docker_service_unit_path }}"
    owner: root
    group: root
    mode: '0644'
  when: docker_permission_files.results[0].stat.exists

- name: "3-2. docker.socket 소유권(root:root) 및 권한(644) 설정"
  ansible.builtin.file:
    path: "{{ docker_socket_unit_path }}"
    owner: root
    group: root
    mode: '0644'
  when: docker_permission_files.results[1].stat.exists

- name: "3-3. /etc/docker 디렉터리 소유권(root:root) 및 권한(755) 설정"
  ansible.builtin.file:
    path: "{{ docker_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: "3-4. Docker 소켓 파일 소유권(root:docker) 및 권한(660) 설정"
  ansible.builtin.file:
    path: "{{ docker_socket_path }}"
    owner: root
    group: "{{ docker_group_name }}"
    mode: '0660'
  when: docker_permission_files.results[2].stat.exists
