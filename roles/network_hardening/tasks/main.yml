---
- name: Validate network security mode for network hardening
  ansible.builtin.assert:
    that:
      - network_security_mode in ["audit", "harden"]
    fail_msg: "network_security_mode must be either 'audit' or 'harden'."

- name: Audit RouterOS service status
  community.routeros.command:
    commands:
      - /ip service print detail without-paging
  register: network_hardening_service_audit
  changed_when: false

- name: Audit RouterOS user status
  community.routeros.command:
    commands:
      - /user print detail without-paging
  register: network_hardening_user_audit
  changed_when: false

- name: Audit RouterOS snmp status
  community.routeros.command:
    commands:
      - /snmp print detail without-paging
  register: network_hardening_snmp_audit
  changed_when: false

- name: Audit RouterOS interface status
  community.routeros.command:
    commands:
      - /interface print detail without-paging
  register: network_hardening_interface_audit
  changed_when: false

- name: Show RouterOS audit results
  ansible.builtin.debug:
    msg:
      service: "{{ network_hardening_service_audit.stdout_lines | default([]) }}"
      user: "{{ network_hardening_user_audit.stdout_lines | default([]) }}"
      snmp: "{{ network_hardening_snmp_audit.stdout_lines | default([]) }}"
      interface: "{{ network_hardening_interface_audit.stdout_lines | default([]) }}"
  when: network_security_mode == "audit"

- name: Require management CIDR overrides for harden mode
  ansible.builtin.assert:
    that:
      - network_hardening_allowed_management_cidrs | length > 0
    fail_msg: "Set network_hardening_allowed_management_cidrs before running harden mode."
  when:
    - apply_policy | bool
    - network_security_mode == "harden"

- name: Restrict ssh management access
  community.routeros.command:
    commands:
      - >-
        /ip service set [find name={{ network_hardening_ssh_service_name }}]
        address={{ network_hardening_allowed_management_cidrs | join(",") }}
  register: network_hardening_ssh_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"

- name: Restrict winbox management access
  community.routeros.command:
    commands:
      - >-
        /ip service set [find name={{ network_hardening_winbox_service_name }}]
        address={{ network_hardening_allowed_management_cidrs | join(",") }}
  register: network_hardening_winbox_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"

- name: Disable non-required management services
  community.routeros.command:
    commands:
      - /ip service set [find name={{ item }}] disabled=yes
  loop: "{{ network_hardening_disabled_services }}"
  register: network_hardening_services_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"

- name: Apply RouterOS CLI session timeout to selected users
  community.routeros.command:
    commands:
      - >-
        /user set [find name="{{ item }}"]
        inactivity-timeout={{ network_hardening_session_timeout }}
        inactivity-policy={{ network_hardening_session_inactivity_policy }}
  loop: "{{ network_hardening_session_timeout_users }}"
  register: network_hardening_session_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"
    - network_hardening_session_timeout_users | length > 0

- name: Disable snmp
  community.routeros.command:
    commands:
      - /snmp set enabled=no
  register: network_hardening_snmp_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"
    - network_hardening_disable_snmp

- name: Disable unused interfaces scaffold
  community.routeros.command:
    commands:
      - /interface disable [find name="{{ item }}"]
  loop: "{{ network_hardening_unused_interfaces }}"
  register: network_hardening_interfaces_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"
    - network_hardening_unused_port_shutdown_enabled | bool
    - network_hardening_unused_interfaces | length > 0

- name: Apply RouterOS rp-filter scaffold
  community.routeros.command:
    commands:
      - /ip settings set rp-filter={{ network_hardening_rp_filter_mode }}
  register: network_hardening_rp_filter_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"
    - network_hardening_rp_filter_enabled

- name: Apply RouterOS DoS protection scaffold
  community.routeros.command:
    commands:
      - "{{ item }}"
  loop: "{{ network_hardening_dos_rules }}"
  register: network_hardening_dos_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"
    - network_hardening_dos_protection_enabled
    - network_hardening_dos_rules | length > 0

- name: Apply RouterOS drop logging scaffold
  community.routeros.command:
    commands:
      - /ip firewall filter add chain=input action=log log=yes log-prefix="AISE_DROP"
  register: network_hardening_drop_logging_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"
    - network_hardening_drop_logging_enabled

- name: Apply RouterOS default drop scaffold
  community.routeros.command:
    commands:
      - /ip firewall filter add chain=input action=drop comment="default_drop_scaffold"
  register: network_hardening_default_drop_result
  when:
    - apply_policy | bool
    - network_security_mode == "harden"
    - network_hardening_default_drop_enabled | bool
    - network_hardening_default_drop_confirmed | bool

- name: Generate network_hardening security report
  ansible.builtin.include_tasks: report.yml
  when: network_hardening_report_enabled | bool
