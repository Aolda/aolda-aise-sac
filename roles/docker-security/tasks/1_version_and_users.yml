---
# CHECK: 대상 OS의 패키지명, Docker 그룹명, 허용 계정을 확인하세요.

- name: "DOCKER-01. Docker 패키지 상태 관리 (RHEL/CentOS)"
  ansible.builtin.dnf:
    name: "{{ docker_package_name_redhat }}"
    state: "{{ docker_package_state }}"
  when:
    - docker_apply_package_update | bool
    - ansible_os_family == "RedHat"

- name: "DOCKER-01. Docker 패키지 상태 관리 (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: "{{ docker_package_name_debian }}"
    state: "{{ docker_package_state }}"
    update_cache: true
  when:
    - docker_apply_package_update | bool
    - ansible_os_family == "Debian"

- name: "DOCKER-02. Docker 그룹 생성 확인"
  ansible.builtin.group:
    name: "{{ docker_group_name }}"
    state: present

- name: "DOCKER-02. 허용된 사용자를 Docker 그룹에 추가"
  ansible.builtin.user:
    name: "{{ item }}"
    groups: "{{ docker_group_name }}"
    append: true
  loop: "{{ docker_allowed_users }}"
  when: item != 'root'

- name: "DOCKER-02. Docker 그룹에서 제거할 사용자 존재 여부 확인"
  ansible.builtin.command: "id -u {{ item }}"
  register: docker_disallowed_users_check
  changed_when: false
  failed_when: false
  loop: "{{ docker_disallowed_group_users }}"

- name: "DOCKER-02. Docker 그룹에서 불필요한 사용자 제거"
  ansible.builtin.command: "gpasswd -d {{ item.0.item }} {{ item.1 }}"
  register: docker_group_remove_result
  changed_when: docker_group_remove_result.rc == 0
  failed_when:
    - docker_group_remove_result.rc != 0
    - "'is not a member' not in docker_group_remove_result.stderr"
    - "'does not exist' not in docker_group_remove_result.stderr"
  loop: "{{ docker_disallowed_users_check.results | product(docker_groups_to_clean) | list }}"
  when:
    - docker_disallowed_group_users | length > 0
    - item.0.rc == 0

- name: "DOCKER-16. Docker Content Trust 환경 변수 파일 설정"
  ansible.builtin.lineinfile:
    path: "{{ docker_content_trust_profile }}"
    create: true
    line: "export DOCKER_CONTENT_TRUST=1"
    owner: root
    group: root
    mode: '0644'
    backup: true
  when: docker_enable_content_trust | bool
